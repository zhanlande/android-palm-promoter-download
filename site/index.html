<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nile Download</title>
  <link rel="icon" href="./assets/app-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <main class="shell">
    <section class="download">
      <div class="hero">
        <div>
          <p class="eyebrow">Android Package</p>
          <h1 id="appName">nile</h1>
          <p class="subtitle" id="subtitle">Loading release information</p>
        </div>
        <img class="app-icon" src="./assets/app-icon.svg" alt="">
      </div>

      <dl class="meta">
        <div>
          <dt>Version</dt>
          <dd id="version">-</dd>
        </div>
        <div>
          <dt>File size</dt>
          <dd id="size">-</dd>
        </div>
        <div>
          <dt>Channel</dt>
          <dd id="channel">-</dd>
        </div>
        <div>
          <dt>SHA-256</dt>
          <dd class="hash" id="sha256">-</dd>
        </div>
      </dl>

      <div class="actions">
        <a class="button primary" id="downloadButton" href="#" aria-disabled="true">Download Latest</a>
        <button class="button secondary" id="copyButton" type="button">Copy Download Link</button>
      </div>

      <div class="link-box">
        <span>Direct download link</span>
        <code id="downloadUrl">Generated after GitHub Pages deployment</code>
      </div>
    </section>
  </main>

  <script src="./assets/app.js"></script>
</body>
</html>
